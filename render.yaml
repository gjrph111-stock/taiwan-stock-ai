services:
  - type: web
    name: taiwan-stock-ai
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python -m stock_v1 web --host 0.0.0.0
    healthCheckPath: /api/status
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: STOCK_V1_DB_PATH
        value: data/tw_stocks_deploy.sqlite
      - key: STOCK_V1_ALLOWED_ORIGINS
        value: "*"
      - key: STOCK_V1_PUBLIC_DEMO
        value: "0"
      - key: STOCK_V1_TELEGRAM_BOT_TOKEN
        sync: false
      - key: STOCK_V1_TELEGRAM_CHAT_ID
        sync: false
      - key: STOCK_V1_JOB_TOKEN
        sync: false
      - key: STOCK_V1_ADMIN_TOKEN
        sync: false
